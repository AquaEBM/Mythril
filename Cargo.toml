[package]
name = "jade"
version = "0.1.0"
edition = "2021"

[lib]
name = "jade"
path = "src/lib.rs"
crate-type = ["cdylib","lib"]

[[bin]]
name = "jade_standalone"
path = "src/main.rs"

[dependencies]

nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", features = ["standalone"]}
plugin_util = { git = "https://github.com/AquaEBM/plugin_util.git", features = ["non_std_simd"] }
wt_osc = { git = "https://github.com/AquaEBM/wt_osc.git" }

rand = "0.8"
atomic_refcell = "0.1"
atomic_float = "0.1"
realfft = "3.2"
hound = "3.5"
polygraph = { git = "https://github.com/AquaEBM/polygraph.git" }

[features]

default = []