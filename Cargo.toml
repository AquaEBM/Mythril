[package]
name = "synth"
version = "0.1.0"
edition = "2021"

[lib]
name = "synth"
path = "src/lib.rs"
crate-type = ["cdylib","lib"]

[[bin]]
name = "synth_standalone"
path = "src/main.rs"

[dependencies]

nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", features = ["standalone"]}
nih_plug_egui = { git = "https://github.com/robbert-vdh/nih-plug.git" }
plugin_util = { git = "https://github.com/AquaEBM/plugin_util.git", features = ["non_std_simd"] }

arrayvec = "0.7"
rand = "0.8"
atomic_refcell = "0.1"
atomic_float = "0.1"
realfft = "3.2"
hound = "3.5"
rtrb = "0.2"
cfg-if = "1.0"
serde = { version = "1.0", features = ["rc"] }