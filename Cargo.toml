[package]
name = "synth"
version = "0.1.0"
edition = "2021"

[lib]
name = "synth"
path = "src/lib.rs"
crate-type = ["cdylib","lib"]

[[bin]]
name = "synth_standalone"
path = "src/main.rs"

[dependencies]

nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", features = ["standalone"]}
nih_plug_egui = { git = "https://github.com/robbert-vdh/nih-plug.git" }
plugin_util = { git = "https://github.com/AquaEBM/plugin_util.git" }

# using portable_simd as a crate (not from std) allows us to build it with our own cfg values
# (this allows using bitmasks for AVX-512)
core_simd = { git = "https://github.com/rust-lang/portable-simd.git" }
std_float = { git = "https://github.com/rust-lang/portable-simd.git" }
arrayvec = "0.7"
rand = "0.8"
parking_lot = "0.12"
atomic_refcell = "0.1"
atomic_float = "0.1"
realfft = "3.2"
hound = "3.5"
rtrb = "0.2"
cfg-if = "1.0"